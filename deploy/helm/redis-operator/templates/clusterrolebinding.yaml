{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "redis-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "redis-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "redis-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "redis-operator.serviceAccountName" . }}
  namespace: {{ include "redis-operator.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "redis-operator.fullname" . }}-leader-election-rolebinding
  namespace: {{ include "redis-operator.namespace" . }}
  labels:
    {{- include "redis-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "redis-operator.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "redis-operator.serviceAccountName" . }}
  namespace: {{ include "redis-operator.namespace" . }}
{{- end }}
